<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVidz</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #1c2b33, #2c5364);
  font-family: 'Segoe UI', sans-serif;
}

/* CARD */
.card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h1 {
  margin-bottom: 5px;
}

.sub {
  font-size: 13px;
  color: #bbb;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-bottom: 15px;
  outline: none;
  background: #111;
  color: white;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00d4aa, #00b894);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* MESSAGE */
#message {
  margin-top: 15px;
  font-size: 13px;
  color: #ccc;
}

/* ================= LOADER ================= */

#loaderScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 999;
}

.loader-text {
  font-size: 18px;
  margin-bottom: 15px;
  letter-spacing: 1px;
}

/* DOT ANIMATION */
.dots span {
  display: inline-block;
  width: 8px;
  height: 8px;
  margin: 5px;
  background: #00d4aa;
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out both;
}

.dots span:nth-child(1) { animation-delay: -0.32s; }
.dots span:nth-child(2) { animation-delay: -0.16s; }

/* SPINNER RING */
.spinner {
  margin-top: 20px;
  width: 50px;
  height: 50px;
  border: 4px solid #333;
  border-top: 4px solid #00d4aa;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

/* ANIMATIONS */
@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

</style>
</head>

<body>

<div class="card">
  <h1>🚀 FlashVidz</h1>
  <p class="sub">Download TikTok & YouTube videos easily</p>

  <input id="linkInput" placeholder="Paste video link here...">
  <button onclick="handleDownload()">Download Now</button>

  <p id="message"></p>
</div>

<!-- ✅ FIXED LOADER -->
<div id="loaderScreen">
  <h2 class="loader-text">Preparing your download</h2>

  <div class="dots">
    <span></span><span></span><span></span>
  </div>

  <div class="spinner"></div>
</div>

<script>

async function handleDownload() {
  let input = document.getElementById("linkInput").value;
  let message = document.getElementById("message");

  message.innerHTML = "";

  if (!input) {
    message.innerHTML = "❌ Enter a link";
    return;
  }

  showLoader();

  try {
    if (input.includes("tiktok")) {
      await downloadTikTok(input);
    } 
    else if (input.includes("youtube") || input.includes("youtu.be")) {
      downloadYouTube(input);
    } 
    else {
      message.innerHTML = "⚠️ Unsupported link";
    }

  } catch (error) {
    message.innerHTML = "❌ Error occurred";
  }

  setTimeout(() => hideLoader(), 2000);
}


// 🔥 TIKTOK
async function downloadTikTok(link) {
  let message = document.getElementById("message");

  message.innerHTML = "🔄 Processing TikTok...";

  try {
    const response = await fetch("https://tikvid-backend.onrender.com/download", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url: link })
    });

    const data = await response.json();

    if (data.download) {
      message.innerHTML = "✅ Download ready";

      const res = await fetch(data.download);
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);

      let a = document.createElement("a");
      a.href = url;
      a.download = "tiktok.mp4";
      document.body.appendChild(a);
      a.click();
      a.remove();

      window.URL.revokeObjectURL(url);

    } else {
      message.innerHTML = "⚠️ Failed to get video";
    }

  } catch (error) {
    message.innerHTML = "❌ Server error";
  }
}


// YOUTUBE
function downloadYouTube(link) {
  let message = document.getElementById("message");

  message.innerHTML = "🔄 Redirecting...";

  let url = "https://en.savefrom.net/1-youtube-video-downloader-4/?url=" + encodeURIComponent(link);

  window.open(url, "_blank");
}


// LOADER CONTROL
function showLoader() {
  document.getElementById("loaderScreen").style.display = "flex";
}

function hideLoader() {
  document.getElementById("loaderScreen").style.display = "none";
}

</script>

</body>
</html>
