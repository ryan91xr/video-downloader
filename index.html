<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Downloader</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  font-family: Arial;
}

.card {
  background: #0d1b1e;
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  color: white;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #00d4aa;
}

#loaderScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000c;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

.spinner {
  border: 5px solid #333;
  border-top: 5px solid #00d4aa;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin-top: 10px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
  <h2>🌍 Multi Downloader</h2>
  <input id="linkInput" placeholder="Paste TikTok / YouTube link">
  <button onclick="handleDownload()">Download</button>
  <p id="message"></p>
</div>

<div id="loaderScreen">
  <h2>⏳ Processing...</h2>
  <div class="spinner"></div>
</div>

<script>
async function handleDownload() {
  let input = document.getElementById("linkInput").value;
  let message = document.getElementById("message");

  message.innerHTML = "";

  if (!input) {
    message.innerHTML = "❌ Enter a link";
    return;
  }

  showLoader();

  try {
    // DETECT PLATFORM
    if (input.includes("tiktok")) {
      await downloadTikTok(input);
    } 
    else if (input.includes("youtube") || input.includes("youtu.be")) {
      downloadYouTube(input);
    } 
    else {
      message.innerHTML = "⚠️ Unsupported link";
    }

  } catch (error) {
    message.innerHTML = "❌ Error occurred";
  }

  setTimeout(() => hideLoader(), 2000);
}

// TIKTOK FUNCTION
async function downloadTikTok(link) {
  let message = document.getElementById("message");

  const response = await fetch("https://tiktok-video-no-watermark2.p.rapidapi.com/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-RapidAPI-Key": "fa17d7fc83mshfc10bf4dff50de5p1765c9jsn6f1fc92a3a5c",
      "X-RapidAPI-Host": "tiktok-video-no-watermark2.p.rapidapi.com"
    },
    body: JSON.stringify({
      url: link,
      hd: "1"
    })
  });

  const data = await response.json();

  if (data && data.data) {
    message.innerHTML = "✅ TikTok download ready";
    window.open(data.data.play, "_blank");
  } else {
    message.innerHTML = "⚠️ TikTok failed";
  }
}

// YOUTUBE FUNCTION (Simple Redirect Method)
function downloadYouTube(link) {
  let message = document.getElementById("message");

  message.innerHTML = "✅ Redirecting to YouTube downloader...";

  // Use external downloader site
  let url = "https://en.savefrom.net/1-youtube-video-downloader-4/?url=" + encodeURIComponent(link);

  window.open(url, "_blank");
}

// LOADER
function showLoader() {
  document.getElementById("loaderScreen").style.display = "flex";
}

function hideLoader() {
  document.getElementById("loaderScreen").style.display = "none";
}
</script>

</body>
</html>
