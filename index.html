<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVidz</title>

<style>
body {
  margin: 0;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #1c2b33, #2c5364);
  font-family: 'Segoe UI', sans-serif;
}

.header {
  margin-top: 20px;
  color: white;
  text-align: center;
}

.brand {
  font-size: 28px;
  font-weight: 700;
}

.brand span {
  color: #00d4aa;
}

.tagline {
  font-size: 13px;
  color: #ccc;
  margin-top: 6px;
}

.card {
  margin-top: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  padding: 22px;
  border-radius: 20px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.input-group input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0a0a0a;
  color: white;
}

.paste-btn {
  padding: 0 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(0,212,170,0.3);
}

#downloadBtn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00d4aa, #00b894);
  color: black;
  font-weight: bold;
  margin-top: 10px;
}

#message {
  margin-top: 12px;
  font-size: 13px;
  color: #ccc;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}

#loaderScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

.dots span {
  width: 10px;
  height: 10px;
  background: #00d4aa;
  margin: 5px;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1.4s infinite;
}

@keyframes bounce {
  0%,80%,100% {transform: scale(0);}
  40% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="header">
  <h1 class="brand">Flash<span>Vidz</span></h1>
  <p class="tagline">Download videos instantly in HD • No watermark</p>
</div>

<div class="card">

  <div class="input-group">
    <input id="linkInput" placeholder="Paste video link...">
    <button class="paste-btn" onclick="pasteLink()">Paste</button>
  </div>

  <p id="platformDetect"></p>

  <button id="downloadBtn" onclick="handleDownload()">Download</button>

  <p id="message"></p>

</div>

<div class="footer">FlashVidz</div>

<div id="loaderScreen">
  <h2>Preparing...</h2>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<script>

let isDownloading = false;

function detectPlatform(link){
  link = link.toLowerCase();
  if(link.includes("tiktok.com")) return "tiktok";
  if(link.includes("instagram.com")) return "instagram";
  if(link.includes("youtube.com") || link.includes("youtu.be")) return "youtube";
  return "unknown";
}

document.getElementById("linkInput").addEventListener("input", function(){
  const platform = detectPlatform(this.value);
  const display = document.getElementById("platformDetect");

  display.innerText =
    platform === "tiktok" ? "Detected: TikTok" :
    platform === "instagram" ? "Detected: Instagram" :
    platform === "youtube" ? "Detected: YouTube" : "";
});

async function pasteLink(){
  try {
    const text = await navigator.clipboard.readText();
    const input = document.getElementById("linkInput");
    input.value = text;
    input.dispatchEvent(new Event("input"));
  } catch {
    alert("Clipboard not allowed");
  }
}

async function handleDownload(){
  if(isDownloading) return;

  const link = document.getElementById("linkInput").value.trim();
  const msg = document.getElementById("message");
  const btn = document.getElementById("downloadBtn");

  msg.innerText = "";

  if(!link){
    msg.innerText = "Enter a link";
    return;
  }

  const platform = detectPlatform(link);

  isDownloading = true;
  btn.disabled = true;
  showLoader();

  try{
    if(platform === "tiktok" || platform === "instagram"){
      await genericDownload(link);
    }
    else if(platform === "youtube"){
      window.open(`https://y2mate.nu/en?q=${encodeURIComponent(link)}`);
    }
    else{
      msg.innerText = "Unsupported link";
    }

  } catch {
    msg.innerText = "Error occurred";
  }

  hideLoader();
  btn.disabled = false;
  isDownloading = false;
}

/* ✅ FINAL FIXED DOWNLOAD FUNCTION */
async function genericDownload(link){
  const msg = document.getElementById("message");

  try{
    msg.innerText = "Starting download...";

    const form = document.createElement("form");
    form.method = "POST";
    form.action = "https://flashvidz-backend.onrender.com/download";

    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "url";
    input.value = link;

    form.appendChild(input);
    document.body.appendChild(form);

    form.submit();
    form.remove();

    msg.innerText = "Download started";

  } catch (err){
    console.log(err);
    msg.innerText = "Download failed";
  }
}

function showLoader(){
  document.getElementById("loaderScreen").style.display = "flex";
}

function hideLoader(){
  document.getElementById("loaderScreen").style.display = "none";
}

</script>

</body>
</html>
