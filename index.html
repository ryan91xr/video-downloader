<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVidz</title>

<style>
body {
  margin: 0;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #1c2b33, #2c5364);
  font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
  margin-top: 20px;
  color: white;
  text-align: center;
}

.brand {
  font-size: 28px;
  font-weight: 700;
}

.brand span {
  color: #00d4aa;
}

.tagline {
  font-size: 13px;
  color: #ccc;
  margin-top: 6px;
}

/* FEATURES */
.features {
  margin-top: 10px;
}

.features span {
  display: inline-block;
  font-size: 11px;
  margin: 4px;
  padding: 6px 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
}

/* CARD */
.card {
  margin-top: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  padding: 22px;
  border-radius: 20px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.12);
}

/* INPUT GROUP (NEW) */
.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.input-group input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0a0a0a;
  color: white;
}

.input-group input:focus {
  outline: none;
  border-color: #00d4aa;
}

/* PASTE BUTTON (NOW INLINE 🔥) */
.paste-btn {
  padding: 0 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  color: #e0f7f4;
  border: 1px solid rgba(0,212,170,0.25);
  font-size: 12px;
  white-space: nowrap;
}

/* DOWNLOAD BUTTON */
#downloadBtn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00d4aa, #00b894);
  color: #00221c;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 6px 20px rgba(0,212,170,0.3);
}

button:active {
  transform: scale(0.97);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* TRUST */
.trust {
  font-size: 11px;
  color: #aaa;
  margin-top: 10px;
}

/* PREVIEW */
#previewBox {
  display: none;
  margin-top: 15px;
  background: #111;
  border-radius: 12px;
  padding: 10px;
}

#previewBox img {
  width: 100%;
  border-radius: 10px;
}

/* MESSAGE */
#message {
  margin-top: 12px;
  font-size: 13px;
  color: #ccc;
}

/* FOOTER */
.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}

/* LOADER */
#loaderScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 999;
}

.loader-text {
  font-size: 16px;
  margin-bottom: 20px;
}

.dots span {
  width: 10px;
  height: 10px;
  background: #00d4aa;
  margin: 5px;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1.4s infinite;
}

.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce {
  0%,80%,100% {transform: scale(0);}
  40% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="header">
  <h1 class="brand">Flash<span>Vidz</span></h1>
  <p class="tagline">Download videos instantly in HD • No watermark</p>

  <div class="features">
    <span>Ultra-fast downloads</span>
    <span>No watermark</span>
    <span>HD quality</span>
  </div>
</div>

<div class="card">

  <!-- 🔥 NEW INPUT SYSTEM -->
  <div class="input-group">
    <input id="linkInput" placeholder="Paste TikTok link...">
    <button class="paste-btn" onclick="pasteLink()">Paste</button>
  </div>

  <button id="downloadBtn" onclick="handleDownload()">Download</button>

  <p class="trust">No login • Secure • Instant download</p>

  <div id="previewBox">
    <img id="previewImg">
  </div>

  <p id="message"></p>

</div>

<div class="footer">FlashVidz</div>

<div id="loaderScreen">
  <h2 class="loader-text" id="loaderText">Preparing your video...</h2>
  <div class="dots">
    <span></span><span></span><span></span>
  </div>
</div>

<script>

let isDownloading = false;

async function pasteLink(){
  try {
    let text = await navigator.clipboard.readText();
    document.getElementById("linkInput").value = text;
  } catch {
    alert("Clipboard permission denied");
  }
}

function setLoaderText(text){
  document.getElementById("loaderText").innerText = text;
}

async function handleDownload(){
  if(isDownloading) return;

  let link = document.getElementById("linkInput").value.trim();
  let msg = document.getElementById("message");
  let btn = document.getElementById("downloadBtn");

  msg.innerHTML = "";

  if(!link){
    msg.innerHTML="Please enter a valid link";
    return;
  }

  isDownloading = true;
  btn.innerText = "Processing...";
  btn.disabled = true;

  showLoader();

  try{
    setLoaderText("Connecting...");
    await new Promise(r=>setTimeout(r,600));

    setLoaderText("Fetching video...");
    await new Promise(r=>setTimeout(r,600));

    setLoaderText("Preparing download...");

    if(link.includes("tiktok")){
      await downloadTikTok(link);
    } else {
      msg.innerHTML="Platform not supported yet";
    }

  }catch{
    msg.innerHTML="Something went wrong. Try again.";
  }

  hideLoader();
  btn.innerText = "Download";
  btn.disabled = false;
  isDownloading = false;
}

async function downloadTikTok(link){
  let msg = document.getElementById("message");

  const res = await fetch("https://tikvid-backend.onrender.com/download",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({url:link})
  });

  const data = await res.json();

  if(data.download){

    if(data.cover){
      document.getElementById("previewBox").style.display="block";
      document.getElementById("previewImg").src = data.cover;
    }

    msg.innerHTML="Downloading...";

    const file = await fetch(data.download);
    const blob = await file.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href=url;
    a.download=`flashvidz_${Date.now()}.mp4`;
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);

    msg.innerHTML="Download complete";

  } else {
    msg.innerHTML="Unable to fetch video";
  }
}

function showLoader(){
  document.getElementById("loaderScreen").style.display="flex";
}

function hideLoader(){
  document.getElementById("loaderScreen").style.display="none";
}

</script>

</body>
</html>
