<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader Pro</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  font-family: Arial;
}

.card {
  background: #0d1b1e;
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  color: white;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #00d4aa;
}

.loader {
  display: none;
  margin: 10px auto;
  border: 4px solid #333;
  border-top: 4px solid #00d4aa;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

#result {
  display: none;
  margin-top: 10px;
}

#result img {
  width: 100%;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="card">
  <h2>🎬 Video Downloader</h2>
  <input id="linkInput" placeholder="Paste TikTok link">

  <button onclick="handleDownload()">Download</button>

  <div class="loader" id="loader"></div>
  <div id="message"></div>

  <div id="result">
    <p id="videoTitle"></p>
    <img id="thumbnail">

    <a id="downloadLink" download>
      <button>⬇ Download</button>
    </a>
  </div>
</div>

<script>
async function handleDownload() {
  let input = document.getElementById("linkInput").value;
  let loader = document.getElementById("loader");
  let message = document.getElementById("message");
  let result = document.getElementById("result");
  let title = document.getElementById("videoTitle");
  let thumbnail = document.getElementById("thumbnail");
  let downloadLink = document.getElementById("downloadLink");

  message.innerHTML = "";
  result.style.display = "none";

  if (!input) {
    message.innerHTML = "❌ Enter a link";
    return;
  }

  loader.style.display = "block";

  try {
    const response = await fetch("https://tiktok-video-no-watermark2.p.rapidapi.com/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-RapidAPI-Key": "fa17d7fc83mshfc10bf4dff50de5p1765c9jsn6f1fc92a3a5c",
        "X-RapidAPI-Host": "tiktok-video-no-watermark2.p.rapidapi.com"
      },
      body: JSON.stringify({
        url: input,
        hd: "1"
      })
    });

    const data = await response.json();

    loader.style.display = "none";

    if (data && data.data) {
      message.innerHTML = "✅ Video ready!";
      result.style.display = "block";

      title.innerHTML = data.data.title;
      thumbnail.src = data.data.cover;
      downloadLink.href = data.data.play;

    } else {
      message.innerHTML = "⚠️ Failed to fetch video";
    }

  } catch (error) {
    loader.style.display = "none";
    message.innerHTML = "❌ Error occurred";
    console.error(error);
  }
}
</script>

</body>
</html>
