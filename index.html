<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVidz</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #1c2b33, #2c5364);
  font-family: 'Segoe UI', sans-serif;
}

.card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h1 { margin-bottom: 5px; }

.sub {
  font-size: 13px;
  color: #bbb;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
  outline: none;
  background: #111;
  color: white;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00d4aa, #00b894);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover { transform: scale(1.05); }

#message {
  margin-top: 10px;
  font-size: 13px;
  color: #ccc;
}

#platform {
  font-size: 12px;
  color: #00d4aa;
  margin-bottom: 10px;
}

/* LOADER */
#loaderScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 999;
}

.loader-text {
  font-size: 18px;
  margin-bottom: 20px;
}

.dots span {
  display: inline-block;
  width: 10px;
  height: 10px;
  margin: 6px;
  background: #00d4aa;
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out both;
}

.dots span:nth-child(1) { animation-delay: -0.32s; }
.dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="card">
  <h1>🚀 FlashVidz</h1>
  <p class="sub">Fast video downloads • No watermark • Free</p>

  <input id="linkInput" placeholder="Paste video link here...">

  <p id="platform"></p>

  <button onclick="pasteLink()" style="margin-bottom:10px;background:#222;color:white;">
    📋 Paste Link
  </button>

  <button id="downloadBtn" onclick="handleDownload()">Download Now</button>

  <p id="message"></p>
</div>

<!-- HOW TO USE -->
<div style="margin-top:20px;color:#ccc;font-size:13px;text-align:center;">
  <p><b>How to use:</b></p>
  <p>1. Paste your video link</p>
  <p>2. Click download</p>
  <p>3. Save your video instantly</p>
</div>

<!-- LOADER -->
<div id="loaderScreen">
  <h2 class="loader-text">Preparing your download...</h2>
  <div class="dots">
    <span></span><span></span><span></span>
  </div>
</div>

<script>

// PLATFORM DETECTION
document.getElementById("linkInput").addEventListener("input", function () {
  let value = this.value;
  let platform = document.getElementById("platform");

  if (value.includes("tiktok")) {
    platform.innerText = "TikTok detected ✅";
  } else if (value.includes("youtube")) {
    platform.innerText = "YouTube detected ▶️";
  } else {
    platform.innerText = "";
  }
});

// PASTE BUTTON
async function pasteLink() {
  const text = await navigator.clipboard.readText();
  document.getElementById("linkInput").value = text;
}

// MAIN DOWNLOAD
async function handleDownload() {
  let input = document.getElementById("linkInput").value;
  let message = document.getElementById("message");

  message.innerHTML = "";

  if (!input) {
    message.innerHTML = "❌ Enter a link";
    return;
  }

  showLoader();

  try {
    if (input.includes("tiktok")) {
      await downloadTikTok(input);
    } 
    else if (input.includes("youtube")) {
      downloadYouTube(input);
    } 
    else {
      message.innerHTML = "⚠️ Unsupported link";
    }

  } catch (error) {
    message.innerHTML = "❌ Error occurred";
  }

  hideLoader();
}

// TIKTOK
async function downloadTikTok(link) {
  let message = document.getElementById("message");

  try {
    const response = await fetch("https://tikvid-backend.onrender.com/download", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url: link })
    });

    const data = await response.json();

    if (data.download) {
      message.innerHTML = "🎉 Download started!";
      message.style.color = "#00d4aa";

      const res = await fetch(data.download);
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);

      let a = document.createElement("a");
      a.href = url;
      a.download = "video.mp4";
      document.body.appendChild(a);
      a.click();
      a.remove();

      window.URL.revokeObjectURL(url);

    } else {
      message.innerHTML = "⚠️ Failed to get video";
    }

  } catch (error) {
    message.innerHTML = "❌ Server error";
  }
}

// YOUTUBE
function downloadYouTube(link) {
  let url = "https://en.savefrom.net/1-youtube-video-downloader-4/?url=" + encodeURIComponent(link);
  window.open(url, "_blank");
}

// LOADER CONTROL
function showLoader() {
  document.getElementById("loaderScreen").style.display = "flex";
  document.getElementById("downloadBtn").disabled = true;
}

function hideLoader() {
  document.getElementById("loaderScreen").style.display = "none";
  document.getElementById("downloadBtn").disabled = false;
}

</script>

</body>
</html>
