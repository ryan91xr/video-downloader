<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVidz</title>

<style>
body {
  margin: 0;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #1c2b33, #2c5364);
  font-family: 'Segoe UI', sans-serif;
}

.header {
  margin-top: 20px;
  color: white;
  text-align: center;
}

.brand {
  font-size: 28px;
  font-weight: 700;
}

.brand span {
  color: #00d4aa;
}

.tagline {
  font-size: 13px;
  color: #ccc;
  margin-top: 6px;
}

.card {
  margin-top: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  padding: 22px;
  border-radius: 20px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.input-group input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0a0a0a;
  color: white;
}

.paste-btn {
  padding: 0 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(0,212,170,0.3);
}

#downloadBtn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00d4aa, #00b894);
  color: black;
  font-weight: bold;
  margin-top: 10px;
}

#message {
  margin-top: 12px;
  font-size: 13px;
  color: #ccc;
}

/* 🔥 NEW PROGRESS BAR */
.progress-container {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
  display: none;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00d4aa, #00b894);
  transition: width 0.2s ease;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="header">
  <h1 class="brand">Flash<span>Vidz</span></h1>
  <p class="tagline">Download videos instantly in HD • No watermark</p>
</div>

<div class="card">

  <div class="input-group">
    <input id="linkInput" placeholder="Paste video link...">
    <button class="paste-btn" onclick="pasteLink()">Paste</button>
  </div>

  <button id="downloadBtn" onclick="handleDownload()">Download</button>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="message"></p>

</div>

<div class="footer">FlashVidz</div>

<script>

let isDownloading = false;

function detectPlatform(link){
  link = link.toLowerCase();
  if(link.includes("tiktok.com")) return "tiktok";
  if(link.includes("instagram.com")) return "instagram";
  if(link.includes("youtube.com") || link.includes("youtu.be")) return "youtube";
  return "unknown";
}

async function pasteLink(){
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("linkInput").value = text;
  } catch {
    alert("Clipboard not allowed");
  }
}

async function handleDownload(){
  if(isDownloading) return;

  const link = document.getElementById("linkInput").value.trim();
  const msg = document.getElementById("message");
  const btn = document.getElementById("downloadBtn");

  msg.innerText = "";

  if(!link){
    msg.innerText = "Enter a link";
    return;
  }

  const platform = detectPlatform(link);

  isDownloading = true;
  btn.disabled = true;

  try{
    if(platform === "tiktok" || platform === "instagram"){
      await genericDownload(link);
    }
    else if(platform === "youtube"){
      window.open(`https://y2mate.nu/en?q=${encodeURIComponent(link)}`);
    }
    else{
      msg.innerText = "Unsupported link";
    }

  } catch {
    msg.innerText = "Error occurred";
  }

  btn.disabled = false;
  isDownloading = false;
}

async function genericDownload(link){
  const msg = document.getElementById("message");
  const bar = document.getElementById("progressBar");
  const container = document.getElementById("progressContainer");

  try{
    msg.innerText = "Starting...";
    container.style.display = "block";
    bar.style.width = "0%";

    const response = await fetch("https://flashvidz-backend.onrender.com/download", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url: link })
    });

    if(!response.ok){
      msg.innerText = "Download failed";
      container.style.display = "none";
      return;
    }

    const contentLength = response.headers.get("Content-Length");
    const reader = response.body.getReader();

    let received = 0;
    const chunks = [];

    while(true){
      const { done, value } = await reader.read();
      if(done) break;

      chunks.push(value);
      received += value.length;

      if(contentLength){
        const percent = Math.floor((received / contentLength) * 100);
        bar.style.width = percent + "%";
        msg.innerText = `Downloading... ${percent}%`;
      } else {
        msg.innerText = "Downloading...";
      }
    }

    const blob = new Blob(chunks, { type: "video/mp4" });
    const urlBlob = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = urlBlob;
    a.download = "flashvidz.mp4";
    a.click();

    msg.innerText = "Download complete ✅";

    setTimeout(() => {
      container.style.display = "none";
      bar.style.width = "0%";
    }, 2000);

  } catch (err){
    console.log(err);
    msg.innerText = "Error occurred";
    container.style.display = "none";
  }
}

</script>

</body>
</html>
