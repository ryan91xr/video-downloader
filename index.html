<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader Pro</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  font-family: Arial, sans-serif;
}

/* Card */
.card {
  background: rgba(13, 27, 30, 0.95);
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
  margin-bottom: 10px;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #00d4aa;
  font-weight: bold;
  cursor: pointer;
}

/* Fullscreen Loader */
#loaderScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  flex-direction: column;
  color: white;
}

.spinner {
  border: 5px solid #333;
  border-top: 5px solid #00d4aa;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin-top: 15px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>

</head>

<body>

<div class="card">
  <h2>🎬 Video Downloader</h2>
  <p>Paste your TikTok link</p>

  <input id="linkInput" placeholder="Enter video URL">
  <button onclick="handleDownload()">Download</button>

  <p id="message"></p>
</div>

<!-- FULLSCREEN LOADER -->
<div id="loaderScreen">
  <h2>⏳ Processing...</h2>
  <div class="spinner"></div>
</div>

<script>
async function handleDownload() {
  let input = document.getElementById("linkInput").value;
  let message = document.getElementById("message");

  message.innerHTML = "";

  if (!input) {
    message.innerHTML = "❌ Enter a link";
    return;
  }

  showLoader();

  try {
    const response = await fetch("https://tiktok-video-no-watermark2.p.rapidapi.com/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-RapidAPI-Key": "fa17d7fc83mshfc10bf4dff50de5p1765c9jsn6f1fc92a3a5c",
        "X-RapidAPI-Host": "tiktok-video-no-watermark2.p.rapidapi.com"
      },
      body: JSON.stringify({
        url: input,
        hd: "1"
      })
    });

    const data = await response.json();

    if (data && data.data) {
      message.innerHTML = "✅ Starting download...";

      // OPEN DOWNLOAD (no UI preview)
      window.open(data.data.play, "_blank");

    } else {
      message.innerHTML = "⚠️ Failed to fetch video";
    }

  } catch (error) {
    message.innerHTML = "❌ Error occurred";
  }

  setTimeout(() => {
    hideLoader();
  }, 2000);
}

function showLoader() {
  document.getElementById("loaderScreen").style.display = "flex";
}

function hideLoader() {
  document.getElementById("loaderScreen").style.display = "none";
}
</script>

</body>
</html>
