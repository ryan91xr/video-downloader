<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVidz</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #1c2b33, #2c5364);
  font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
  margin-top: 40px;
  color: white;
  text-align: center;
}
.header h1 {
  margin: 0;
  font-size: 26px;
}
.header p {
  font-size: 13px;
  color: #bbb;
}

/* CARD */
.card {
  margin-top: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  width: 330px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
  background: #111;
  color: white;
}

input:focus {
  outline: 2px solid #00d4aa;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00d4aa, #00b894);
  font-weight: bold;
  cursor: pointer;
  margin-top: 8px;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* PREVIEW */
#previewBox {
  display: none;
  margin-top: 15px;
  background: #111;
  border-radius: 12px;
  padding: 10px;
}

#previewBox img {
  width: 100%;
  border-radius: 10px;
}

/* MESSAGE */
#message {
  margin-top: 10px;
  font-size: 13px;
  color: #ccc;
}

/* FOOTER */
.footer {
  margin-top: 25px;
  font-size: 12px;
  color: #aaa;
}

/* LOADER */
#loaderScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

.loader-text {
  font-size: 18px;
  margin-bottom: 20px;
}

.dots span {
  width: 10px;
  height: 10px;
  background: #00d4aa;
  margin: 5px;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1.4s infinite;
}

.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce {
  0%,80%,100% {transform: scale(0);}
  40% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="header">
  <h1>FlashVidz</h1>
  <p>Fast • No watermark • Free</p>
</div>

<div class="card">

  <input id="linkInput" placeholder="Paste video link...">

  <button onclick="pasteLink()">Paste</button>
  <button id="downloadBtn" onclick="handleDownload()">Download</button>

  <div id="previewBox">
    <img id="previewImg" src="">
  </div>

  <p id="message"></p>

</div>

<div class="footer">
  Powered by FlashVidz • No login required
</div>

<!-- LOADER -->
<div id="loaderScreen">
  <h2 class="loader-text" id="loaderText">Connecting...</h2>
  <div class="dots">
    <span></span><span></span><span></span>
  </div>
</div>

<script>

// Safe Paste
async function pasteLink(){
  try {
    let text = await navigator.clipboard.readText();
    document.getElementById("linkInput").value = text;
  } catch {
    alert("Clipboard access denied");
  }
}

// Loader text
function setLoaderText(text){
  document.getElementById("loaderText").innerText = text;
}

// Main
async function handleDownload(){
  let link = document.getElementById("linkInput").value.trim();
  let msg = document.getElementById("message");

  if(!link){
    msg.innerHTML="Please enter a valid link";
    return;
  }

  showLoader();

  setLoaderText("Connecting...");
  setTimeout(()=>setLoaderText("Fetching video..."),800);
  setTimeout(()=>setLoaderText("Preparing download..."),1600);

  try{
    if(link.includes("tiktok")){
      await downloadTikTok(link);
    } else {
      msg.innerHTML="This platform is not supported yet";
    }
  }catch{
    msg.innerHTML="Something went wrong. Try again.";
  }

  hideLoader();
}

// TikTok
async function downloadTikTok(link){
  let msg = document.getElementById("message");

  const res = await fetch("https://tikvid-backend.onrender.com/download",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({url:link})
  });

  const data = await res.json();

  if(data.download){

    if(data.cover){
      document.getElementById("previewBox").style.display="block";
      document.getElementById("previewImg").src = data.cover;
    }

    msg.innerHTML="Download started";

    const file = await fetch(data.download);
    const blob = await file.blob();
    const url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href=url;
    a.download="video.mp4";
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);

  } else {
    msg.innerHTML="Unable to fetch video";
  }
}

// Loader
function showLoader(){
  document.getElementById("loaderScreen").style.display="flex";
  document.getElementById("downloadBtn").disabled=true;
}

function hideLoader(){
  document.getElementById("loaderScreen").style.display="none";
  document.getElementById("downloadBtn").disabled=false;
}

</script>

</body>
</html>
