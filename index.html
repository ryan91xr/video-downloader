<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikVid Pro</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #1c2b33, #2c5364);
  font-family: 'Segoe UI', sans-serif;
}

/* CARD */
.card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* TITLE */
h1 {
  margin-bottom: 5px;
}

.sub {
  font-size: 13px;
  color: #bbb;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-bottom: 15px;
  outline: none;
  background: #111;
  color: white;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00d4aa, #00b894);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* MESSAGE */
#message {
  margin-top: 15px;
  font-size: 13px;
  color: #ccc;
}

/* LOADER SCREEN */
#loaderScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000c;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

.spinner {
  border: 5px solid #333;
  border-top: 5px solid #00d4aa;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  margin-top: 15px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
  <h1>🚀 TikVid Pro</h1>
  <p class="sub">Download TikTok & YouTube videos easily</p>

  <input id="linkInput" placeholder="Paste video link here...">
  <button onclick="handleDownload()">Download Now</button>

  <p id="message"></p>
</div>

<div id="loaderScreen">
  <h2>⏳ Processing...</h2>
  <div class="spinner"></div>
</div>

<script>
async function handleDownload() {
  let input = document.getElementById("linkInput").value;
  let message = document.getElementById("message");

  message.innerHTML = "";

  if (!input) {
    message.innerHTML = "❌ Enter a link";
    return;
  }

  showLoader();

  try {
    if (input.includes("tiktok")) {
      await downloadTikTok(input);
    } 
    else if (input.includes("youtube") || input.includes("youtu.be")) {
      downloadYouTube(input);
    } 
    else {
      message.innerHTML = "⚠️ Unsupported link";
    }

  } catch (error) {
    message.innerHTML = "❌ Error occurred";
  }

  setTimeout(() => hideLoader(), 2000);
}

// TIKTOK
async function downloadTikTok(link) {
  let message = document.getElementById("message");

  const response = await fetch("https://tiktok-video-no-watermark2.p.rapidapi.com/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-RapidAPI-Key": "fa17d7fc83mshfc10bf4dff50de5p1765c9jsn6f1fc92a3a5c",
      "X-RapidAPI-Host": "tiktok-video-no-watermark2.p.rapidapi.com"
    },
    body: JSON.stringify({
      url: link,
      hd: "1"
    })
  });

  const data = await response.json();

  if (data && data.data) {
    message.innerHTML = "✅ TikTok download ready";
    window.open(data.data.play, "_blank");
  } else {
    message.innerHTML = "⚠️ TikTok failed";
  }
}

// YOUTUBE
function downloadYouTube(link) {
  let message = document.getElementById("message");

  message.innerHTML = "🔄 Redirecting...";

  let url = "https://en.savefrom.net/1-youtube-video-downloader-4/?url=" + encodeURIComponent(link);

  window.open(url, "_blank");
}

// LOADER
function showLoader() {
  document.getElementById("loaderScreen").style.display = "flex";
}

function hideLoader() {
  document.getElementById("loaderScreen").style.display = "none";
}
</script>

</body>
</html>
