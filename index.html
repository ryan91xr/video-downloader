<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVidz</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #1c2b33, #2c5364);
  font-family: 'Segoe UI', sans-serif;
}

.header {
  margin-top: 20px;
  color: white;
  text-align: center;
}

.brand {
  font-size: 28px;
  font-weight: 700;
}

.brand span {
  color: #00d4aa;
}

.tagline {
  font-size: 13px;
  color: #ccc;
  margin-top: 6px;
}

.card {
  margin-top: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  padding: 22px;
  border-radius: 20px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.input-group input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0a0a0a;
  color: white;
}

.paste-btn {
  padding: 0 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(0,212,170,0.3);
}

#downloadBtn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00d4aa, #00b894);
  color: black;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
}

#downloadBtn:disabled {
  opacity: 0.6;
}

#message {
  margin-top: 12px;
  font-size: 13px;
  color: #ccc;
}

.loader {
  margin-top: 10px;
  display: none;
}

.loader span {
  display: inline-block;
  width: 8px;
  height: 8px;
  margin: 3px;
  background: #00d4aa;
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}

.loader span:nth-child(2) { animation-delay: 0.2s; }
.loader span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100% { transform: scale(0); }
  40% { transform: scale(1); }
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="header">
  <h1 class="brand">Flash<span>Vidz</span></h1>
  <p class="tagline">Download videos instantly in HD • No watermark</p>
</div>

<div class="card">

  <div class="input-group">
    <input id="linkInput" placeholder="Paste video link...">
    <button class="paste-btn" onclick="pasteLink()">Paste</button>
  </div>

  <button id="downloadBtn" onclick="handleDownload()">Download</button>

  <div class="loader" id="loader">
    <span></span><span></span><span></span>
  </div>

  <p id="message"></p>

</div>

<div class="footer">FlashVidz</div>

<script>
const BASE_URL = window.location.hostname === "localhost"
  ? "http://localhost:3000"
  : "https://flashvidz-backend.onrender.com";

function setMessage(text){
  document.getElementById("message").innerText = text;
}

function showLoader(show){
  document.getElementById("loader").style.display = show ? "block" : "none";
}

async function pasteLink(){
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("linkInput").value = text;
  } catch {
    alert("Clipboard not allowed");
  }
}

async function handleDownload(){
  const link = document.getElementById("linkInput").value.trim();
  const btn = document.getElementById("downloadBtn");

  if(!link){
    setMessage("Enter a link");
    return;
  }

  btn.disabled = true;
  setMessage("Preparing video...");
  showLoader(true);

  try{
    const res = await fetch(`${BASE_URL}/prepare`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: link })
    });

    const data = await res.json();

    if(!data.success){
      setMessage("Failed to process video");
      showLoader(false);
      btn.disabled = false;
      return;
    }

    setMessage("Starting download...");
    showLoader(false);

    // ✅ DIRECT DOWNLOAD (NO POPUP)
    window.location.href = BASE_URL + data.downloadUrl;

    btn.disabled = false;

  } catch {
    setMessage("Error occurred");
    showLoader(false);
    btn.disabled = false;
  }
}
</script>

</body>
</html>
