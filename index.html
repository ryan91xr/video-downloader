<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVidz</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #1c2b33, #2c5364);
  font-family: 'Segoe UI', sans-serif;
}

.header { margin-top: 20px; color: white; text-align: center; }

.brand { font-size: 28px; font-weight: 700; }
.brand span { color: #00d4aa; }

.tagline { font-size: 13px; color: #ccc; margin-top: 6px; }

.card {
  margin-top: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  padding: 22px;
  border-radius: 20px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.input-group { display: flex; gap: 8px; margin-bottom: 12px; }

.input-group input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0a0a0a;
  color: white;
}

.paste-btn {
  padding: 0 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(0,212,170,0.3);
}

#downloadBtn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00d4aa, #00b894);
  color: black;
  font-weight: bold;
  margin-top: 10px;
}

#cancelBtn {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,100,100,0.5);
  background: rgba(255,100,100,0.1);
  color: #ff6464;
  margin-top: 8px;
  display: none;
}

.progress-container {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
  display: none;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00d4aa, #00b894);
}

#message { margin-top: 12px; font-size: 13px; }

.footer { margin-top: 20px; font-size: 12px; color: #aaa; }
</style>
</head>

<body>

<div class="header">
  <h1 class="brand">Flash<span>Vidz</span></h1>
  <p class="tagline">Download videos instantly in HD • No watermark</p>
</div>

<div class="card">

  <div class="input-group">
    <input id="linkInput" placeholder="Paste video link...">
    <button class="paste-btn" onclick="pasteLink()">Paste</button>
  </div>

  <button id="downloadBtn" onclick="handleDownload()">Download</button>
  <button id="cancelBtn" onclick="cancelDownload()">Cancel</button>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="message"></p>

</div>

<div class="footer">FlashVidz</div>

<script>
const CONFIG = {
  API_URL: window.location.hostname === 'localhost' 
    ? 'http://localhost:3000/download'
    : 'https://flashvidz-backend.onrender.com/download'
};

let downloadTimer = null;

function setMessage(text) {
  document.getElementById('message').textContent = text;
}

function resetUI() {
  document.getElementById('downloadBtn').disabled = false;
  document.getElementById('downloadBtn').textContent = 'Download';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('progressContainer').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';
}

async function pasteLink() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("linkInput").value = text;
  } catch {
    setMessage("Clipboard not allowed");
  }
}

function cancelDownload() {
  clearTimeout(downloadTimer);
  setMessage("Cancelled");
  resetUI();
}

function handleDownload() {
  const link = document.getElementById("linkInput").value.trim();
  const btn = document.getElementById("downloadBtn");
  const bar = document.getElementById("progressBar");

  if (!link) {
    setMessage("Enter a link");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Downloading...";
  document.getElementById("cancelBtn").style.display = "block";
  document.getElementById("progressContainer").style.display = "block";

  setMessage("Downloading...");

  // 🔥 REAL DOWNLOAD (NO POPUP)
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = CONFIG.API_URL + "?url=" + encodeURIComponent(link);
  document.body.appendChild(iframe);

  // Fake progress
  let progress = 0;
  const interval = setInterval(() => {
    progress += 10;
    if (progress <= 90) {
      bar.style.width = progress + "%";
    }
  }, 300);

  // Auto reset UI
  downloadTimer = setTimeout(() => {
    clearInterval(interval);
    bar.style.width = "100%";
    setMessage("Download complete!");
    resetUI();
  }, 4000);
}
</script>

</body>
</html>
